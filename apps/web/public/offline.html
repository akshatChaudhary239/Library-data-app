<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Library PWA</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f5;
      color: #18181b;
      text-align: center;
      padding: 1rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #71717a;
    }
    h1 {
      margin-bottom: 0.5rem;
      font-size: 1.5rem;
    }
    p {
      color: #71717a;
      margin-bottom: 2rem;
      max-width: 400px;
    }
    button {
      background-color: #18181b;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #09090b;
        color: #fafafa;
      }
      p {
        color: #a1a1aa;
      }
      button {
        background-color: #fafafa;
        color: #18181b;
      }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You are offline</h1>
  <p>It seems you've lost your internet connection. Check your network and try again.</p>
  <button onclick="window.location.reload()">Retry</button>
</body>
</html>
